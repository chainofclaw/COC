name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-node:
    name: Node Tests (859+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: cd node && npm ci
      - name: Run node tests
        run: |
          cd node
          node --experimental-strip-types --test --test-reporter=spec --test-reporter-destination=stdout --test-reporter=junit --test-reporter-destination=node-results.xml $(find src -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: node/node-results.xml
          retention-days: 7

  test-runtime:
    name: Runtime Tests (72+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: cd node && npm ci
      - run: cd runtime && npm install --omit=dev
      - name: Run runtime tests
        run: |
          node --experimental-strip-types --test \
            $(find runtime/lib -name '*.test.ts' -type f | sort) \
            $(find runtime -maxdepth 1 -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test

  test-services:
    name: Services + NodeOps + Tests Workspace (337+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: cd node && npm ci
      - run: npm install --no-save ethers
      - name: Run service tests
        run: |
          node --experimental-strip-types --test --test-reporter=spec --test-reporter-destination=stdout --test-reporter=junit --test-reporter-destination=service-results.xml \
            $(find services -name '*.test.ts' -type f | sort) \
            $(find nodeops -name '*.test.ts' -type f | sort) \
            $(find tests -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-test-results
          path: service-results.xml
          retention-days: 7

  test-contracts:
    name: Contract Tests + Deploy CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: cd contracts && npm ci
      - run: cd contracts && npm test
      - run: |
          node --experimental-default-type=module --experimental-strip-types --test \
            $(find contracts/deploy -name '*.test.ts' -type f | sort)

  test-wallet:
    name: Wallet Tests (8+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: cd wallet && npm install --omit=dev
      - name: Run wallet tests
        run: |
          node --experimental-strip-types --test \
            $(find wallet -maxdepth 1 -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test

  test-explorer:
    name: Explorer Build + Lib Tests (43+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: explorer/package-lock.json
      - run: cd explorer && npm ci
      - name: Run explorer lib tests
        run: |
          node --experimental-default-type=module --experimental-strip-types --test \
            $(find explorer/src/lib -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test
      - name: Build explorer
        run: cd explorer && npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  test-faucet:
    name: Faucet Tests (26+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: faucet/package-lock.json
      - run: cd faucet && npm ci
      - name: Run faucet tests
        run: |
          node --experimental-strip-types --test \
            $(find faucet/src -name '*.test.ts' -type f | sort)
        env:
          NODE_ENV: test

  test-gate:
    name: Test Gate
    needs: [test-node, test-runtime, test-services, test-contracts, test-wallet, test-explorer, test-faucet]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-node.result }}" != "success" ] || \
             [ "${{ needs.test-runtime.result }}" != "success" ] || \
             [ "${{ needs.test-services.result }}" != "success" ] || \
             [ "${{ needs.test-contracts.result }}" != "success" ] || \
             [ "${{ needs.test-wallet.result }}" != "success" ] || \
             [ "${{ needs.test-explorer.result }}" != "success" ] || \
             [ "${{ needs.test-faucet.result }}" != "success" ]; then
            echo "::error::One or more test suites failed"
            echo "Node: ${{ needs.test-node.result }}"
            echo "Runtime: ${{ needs.test-runtime.result }}"
            echo "Services: ${{ needs.test-services.result }}"
            echo "Contracts: ${{ needs.test-contracts.result }}"
            echo "Wallet: ${{ needs.test-wallet.result }}"
            echo "Explorer: ${{ needs.test-explorer.result }}"
            echo "Faucet: ${{ needs.test-faucet.result }}"
            exit 1
          fi
          echo "All test suites passed"
