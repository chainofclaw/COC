# R1.4 — H15 fork-off devnet fixture
#
# Spawns 5 BFT validators on chainId 88888 (independent of upstream 18780)
# so the H15 staggered-fallback proposer override (consensus.ts L256-365)
# can be exercised by stopping the round-robin proposer for ≥600s.
#
# All 5 validators use the well-known anvil index 0..4 private keys
# (public test keys, no real ETH at risk). nodeId == EVM address derived
# from each key.
#
# Port allocation avoids the production 28780-29781 + 38780-38786 (legacy
# 3-validator fixture) ranges:
#   h15-node-1: 38790 (RPC), 39110 (metrics)
#   h15-node-2: 38792, 39112
#   h15-node-3: 38794, 39114
#   h15-node-4: 38796, 39116
#   h15-node-5: 38798, 39118

services:
  h15-node-1:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.node
    container_name: coc-h15-node-1
    hostname: h15-node-1
    ports:
      - "38790:18780"
      - "39110:9100"
    volumes:
      - ./configs-h15/node-1.json:/data/coc/node-config.json:ro
      - h15-node1-data:/data/coc
    environment:
      - COC_DATA_DIR=/data/coc
      - COC_NODE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - COC_BFT_AUTO_RECOVERY=1
    networks: [coc-h15]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18780 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  h15-node-2:
