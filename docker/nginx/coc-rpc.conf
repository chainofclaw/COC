# COC RPC Reverse Proxy with rate limiting — REFERENCE TEMPLATE.
#
# NOTE: This is a reference template, not the live production config. The
# live canary (88780) web host serves the public site from
# /etc/nginx/sites-enabled/clawchain.io, whose /api/testnet/rpc and
# /api/testnet/ws locations proxy to the upstreams below. Keep them
# pointing at *live* validator/observer nodes — never at a co-located
# coc-node that might be stopped (e.g. a retired/equivocating validator),
# or the proxy returns 502 and the website/explorer show no network status.
#
# Browser → same-origin HTTPS proxy → server-to-server HTTP to a live node
# avoids mixed-content (an http:// node URL from an https:// page is blocked).
#
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting zone: 100 req/s per IP
limit_req_zone $binary_remote_addr zone=coc_rpc:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=coc_explorer:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=coc_verify:10m rate=2r/s;

# Live-node failover: v3 primary, v4/v5 backup (canary 88780, ports 28780/28790).
upstream coc_rpc {
    server 199.192.16.79:28780 max_fails=3 fail_timeout=15s;   # v3 primary
    server 159.198.36.3:28780  backup;                          # v4
    server 159.198.36.25:28780 backup;                          # v5
}

upstream coc_ws {
    server 199.192.16.79:28790 max_fails=3 fail_timeout=15s;   # v3 primary
    server 159.198.36.3:28790  backup;                          # v4
    server 159.198.36.25:28790 backup;                          # v5
}

upstream coc_explorer {
    server 127.0.0.1:3000;
}

upstream coc_faucet {
    server 127.0.0.1:3003;
}

server {
    listen 443 ssl http2;
    server_name rpc.prowl.chainofclaw.com;

    # TLS (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rpc.prowl.chainofclaw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.prowl.chainofclaw.com/privkey.pem;

    # JSON-RPC endpoint
    location / {
        limit_req zone=coc_rpc burst=50 nodelay;

        proxy_pass http://coc_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Block privileged node-local method namespaces at the public edge.
        if ($request_body ~* "(debug_|admin_)") {
            return 403;
        }
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://coc_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 443 ssl http2;
    server_name explorer.prowl.chainofclaw.com;

    ssl_certificate /etc/letsencrypt/live/explorer.prowl.chainofclaw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.prowl.chainofclaw.com/privkey.pem;

    client_max_body_size 512k;

    location = /api/verify {
        limit_req zone=coc_verify burst=4 nodelay;
        client_max_body_size 128k;

        proxy_pass http://coc_explorer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location / {
        limit_req zone=coc_explorer burst=40 nodelay;
        proxy_pass http://coc_explorer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

server {
    listen 443 ssl http2;
    server_name faucet.prowl.chainofclaw.com;

    ssl_certificate /etc/letsencrypt/live/faucet.prowl.chainofclaw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faucet.prowl.chainofclaw.com/privkey.pem;

    location / {
        limit_req zone=coc_rpc burst=10 nodelay;

        proxy_pass http://coc_faucet;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name rpc.prowl.chainofclaw.com explorer.prowl.chainofclaw.com faucet.prowl.chainofclaw.com;
    return 301 https://$host$request_uri;
}
