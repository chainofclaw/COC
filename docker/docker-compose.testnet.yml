# COC 3-Node BFT Testnet
# Usage: docker compose -f docker/docker-compose.testnet.yml up -d

x-node-base: &node-base
  image: ${COC_NODE_IMAGE:-ghcr.io/chainofclaw/coc-node}:${IMAGE_TAG:-latest}
  build:
    context: ..
    dockerfile: docker/Dockerfile.node
  restart: unless-stopped
  stop_grace_period: 30s
  networks:
    - coc-p2p
    - coc-rpc

services:
  node-1:
    <<: *node-base
    container_name: coc-node-1
    ports:
      - "28780:18780"
      - "28781:18781"
      - "29780:19780"
      - "29781:19781"
      - "9101:9100"
      # IPFS HTTP API (UnixFS /api/v0/add, /api/v0/cat, /ipfs/<cid> gateway).
      # Single public entry — node-2/3 keep 5001 internal-only by design.
      # ⚠ No auth, no rate limit on the exposed port — testnet only.
      - "28786:5001"
    volumes:
      - node1-data:/data/coc
      - ./testnet-configs/node-1.json:/data/coc/node-config.json:ro
    environment:
      - COC_DATA_DIR=/data/coc
      - COC_NODE_CONFIG=/data/coc/node-config.json
      - COC_NODE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

  node-2:
    <<: *node-base
    container_name: coc-node-2
    ports:
      - "28782:18780"
      - "28783:18781"
      - "29782:19780"
      - "29783:19781"
      - "9102:9100"
    volumes:
      - node2-data:/data/coc
      - ./testnet-configs/node-2.json:/data/coc/node-config.json:ro
    environment:
      - COC_DATA_DIR=/data/coc
      - COC_NODE_CONFIG=/data/coc/node-config.json
      - COC_NODE_KEY=0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d

  node-3:
    <<: *node-base
    container_name: coc-node-3
    ports:
      - "28784:18780"
      - "28785:18781"
      - "29784:19780"
      - "29785:19781"
      - "9103:9100"
    volumes:
      - node3-data:/data/coc
      - ./testnet-configs/node-3.json:/data/coc/node-config.json:ro
    environment:
      - COC_DATA_DIR=/data/coc
      - COC_NODE_CONFIG=/data/coc/node-config.json
      - COC_NODE_KEY=0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a

  sync-node:
    <<: *node-base
    container_name: coc-sync-node
    ports:
      - "18780:18780"
      - "18781:18781"
      - "19880:19780"
      - "19881:19781"
      - "9104:9100"
    volumes:
      - sync-data:/data/coc
      - ./testnet-configs/sync-node.json:/data/coc/node-config.json:ro
    environment:
      - COC_DATA_DIR=/data/coc
      - COC_NODE_CONFIG=/data/coc/node-config.json
      - COC_NODE_KEY=0x4bbbf85ce3377467afe5d46f804f221813b2bb87f24d81f60f1fcdbf7cbf4356
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy

  explorer:
    image: ${COC_EXPLORER_IMAGE:-ghcr.io/chainofclaw/coc-explorer}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.explorer
      args:
        NEXT_PUBLIC_RPC_URL: http://node-1:18780
        NEXT_PUBLIC_WS_URL: ws://node-1:18781
    container_name: coc-explorer
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      node-1:
        condition: service_healthy
    networks:
      - coc-rpc
    restart: unless-stopped

  faucet:
    image: ${COC_FAUCET_IMAGE:-ghcr.io/chainofclaw/coc-faucet}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.faucet
    container_name: coc-faucet
    ports:
      - "3003:3003"
    environment:
      - COC_FAUCET_RPC_URL=http://node-1:18780
      - COC_FAUCET_PRIVATE_KEY=${COC_FAUCET_KEY:-0x47e179ec197488593b187f80a00eb0da91f1b9d0b13f8733639f19c30a34926a}
    depends_on:
      node-1:
        condition: service_healthy
    networks:
      - coc-rpc
    restart: unless-stopped

  # Phase C PoSe v2 prover sidecars.
  # Each prover serves /pose/challenge + /pose/receipt for ONE validator
  # using that validator's private key. The prover reads chunk bytes from
  # the validator's blockstore (storage/blocks subdir) to build live
  # Merkle proofs for storage challenges.
  #
  # ⚠️ Volume MUST be mounted :ro. Sharing a RW volume with the validator
  # caused a 95-min testnet halt on 2026-04-25 (see
  # docs/incident-2026-04-25-chain-halt-post-mortem-{zh,en}.md).
  # LevelDB does not safely tolerate two processes opening the same DB
  # files even if only one writes; cross-container lock semantics under
  # force-recreate are unreliable.
  prover-1: &prover-base
    image: ${COC_RUNTIME_IMAGE:-ghcr.io/chainofclaw/coc-runtime}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    container_name: coc-prover-1
    command: ["runtime/coc-node.ts"]
    environment:
      - COC_CONFIG=/app/config.json
      - COC_NODE_PK=${COC_NODE1_PK:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      - COC_RPC_URL=http://node-1:18780
    volumes:
      - node1-data:/data/coc:ro    # ← :ro is mandatory; see header comment
      - ./testnet-runtime-configs/provers/node-1.json:/app/config.json:ro
    ports:
      - "127.0.0.1:19901:18800"
    networks:
      coc-rpc:
        aliases:
          - prover-1   # agent.json's nodeEndpoints reference http://prover-1:18800
    depends_on:
      node-1:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - pose

  prover-2:
    <<: *prover-base
    container_name: coc-prover-2
    environment:
      - COC_CONFIG=/app/config.json
      - COC_NODE_PK=${COC_NODE2_PK:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}
      - COC_RPC_URL=http://node-2:18780
    volumes:
      - node2-data:/data/coc:ro
      - ./testnet-runtime-configs/provers/node-2.json:/app/config.json:ro
    ports:
      - "127.0.0.1:19902:18800"
    networks:
      coc-rpc:
        aliases:
          - prover-2
    depends_on:
      node-2:
        condition: service_healthy

  prover-3:
    <<: *prover-base
    container_name: coc-prover-3
    environment:
      - COC_CONFIG=/app/config.json
      - COC_NODE_PK=${COC_NODE3_PK:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a}
      - COC_RPC_URL=http://node-3:18780
    volumes:
      - node3-data:/data/coc:ro
      - ./testnet-runtime-configs/provers/node-3.json:/app/config.json:ro
    ports:
      - "127.0.0.1:19903:18800"
    networks:
      coc-rpc:
        aliases:
          - prover-3
    depends_on:
      node-3:
        condition: service_healthy

  agent:
    image: ${COC_RUNTIME_IMAGE:-ghcr.io/chainofclaw/coc-runtime}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    container_name: coc-agent
    command: ["runtime/coc-agent.ts"]
    environment:
      - COC_DATA_DIR=/data/coc/runtime
      - COC_CONFIG=/data/coc/runtime/agent.json
      - COC_OPERATOR_PK=${COC_OPERATOR_PK:-0x8b3a350cf5c34c9194ca3a545d6546d9f8b66d0f6937f33ce3cbb7a7e3c7eca0}
    volumes:
      - runtime-data:/data/coc/runtime
      - ./testnet-runtime-configs/agent.json:/data/coc/runtime/agent.json:ro
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy
    networks:
      - coc-rpc
    restart: unless-stopped
    profiles:
      - pose

  relayer:
    image: ${COC_RUNTIME_IMAGE:-ghcr.io/chainofclaw/coc-runtime}:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    container_name: coc-relayer
    command: ["runtime/coc-relayer.ts"]
    environment:
      - COC_DATA_DIR=/data/coc/runtime
      - COC_CONFIG=/data/coc/runtime/relayer.json
      # Hardhat #0 — same key as PoSeManagerV2 deployer/owner so finalizeEpochV2
      # / initEpochNonce (onlyOwner) succeed. The previously-default key
      # (0xdbda...c4c → 0x8642...DA45) reverted with "not owner" because the
      # contract was deployed under #0. Override only if you transferOwnership
      # to a separate operational signer.
      - COC_SLASHER_PK=${COC_SLASHER_PK:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    volumes:
      - runtime-data:/data/coc/runtime
      - ./testnet-runtime-configs/relayer.json:/data/coc/runtime/relayer.json:ro
    depends_on:
      node-1:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - coc-rpc
    restart: unless-stopped
    profiles:
      - pose

volumes:
  node1-data:
  node2-data:
  node3-data:
  sync-data:
  runtime-data:

networks:
  coc-p2p:
    driver: bridge
    internal: true
    name: docker_coc-p2p
  coc-rpc:
    driver: bridge
    name: docker_coc-rpc
